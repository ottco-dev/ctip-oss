# ─────────────────────────────────────────────────────────────────────────────
# nginx.inference.conf — Reverse proxy for inference-only deployment
#
# Public entry point: http://your-domain.com:3001
#
# Routing (inference stack — no frontend, no annotation):
#   /              → inference API health (JSON)
#   /api/v1/       → FastAPI inference server (:8001)
#   /ws/           → FastAPI WebSocket (:8001, upgraded)
#   /health        → inference API health
#   /mlflow/       → MLflow model registry (:5000, read-only)
#
# Security: Set API_TOKEN in .env — all /api/v1/* calls are token-gated at
#           the FastAPI layer. Do NOT expose this without a token in production.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent rt=$request_time '
                    'ua="$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 65;

    # Large microscopy images (TIFF/PNG can be hundreds of MB)
    client_max_body_size 512M;
    client_body_timeout  300s;
    proxy_read_timeout   300s;
    proxy_send_timeout   300s;
    proxy_connect_timeout 10s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript
               image/svg+xml;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream inference_api {
        server trichome-inference-api:8001;
        keepalive 32;
    }

    upstream mlflow {
        server trichome-inference-mlflow:5000;
        keepalive 8;
    }

    # ── Main server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers (no auth here — handled at FastAPI layer)
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ── Health check (unauthenticated, for load-balancer probes) ──────────
        location = /health {
            proxy_pass         http://inference_api/health;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log         off;
        }

        # ── FastAPI — REST API ─────────────────────────────────────────────────
        location /api/v1/ {
            proxy_pass         http://inference_api/api/v1/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Large inference payloads
            proxy_buffering    off;
            proxy_read_timeout 300s;
        }

        # ── FastAPI — WebSocket ────────────────────────────────────────────────
        location /ws/ {
            proxy_pass         http://inference_api/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        # ── MLflow — model registry (read-only in inference mode) ─────────────
        location /mlflow/ {
            proxy_pass         http://mlflow/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Script-Name     /mlflow;
            proxy_redirect     off;
        }

        # ── Root: minimal JSON status ─────────────────────────────────────────
        location = / {
            return 200 '{"service":"trichome-inference","docs":"/api/v1/docs","health":"/health"}';
            add_header Content-Type application/json;
        }

        # ── Static error pages ────────────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"detail":"Inference API unavailable — starting up or overloaded"}';
            add_header Content-Type application/json;
        }
    }
}
