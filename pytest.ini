[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
asyncio_mode = auto
markers =
    gpu: requires NVIDIA GPU with CUDA
    slow: runs > 30 seconds
    integration: requires external services (CVAT, MLflow, etc.)
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
